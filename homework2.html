<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Superstar Clinic - Patient Registration</title>
  <link href="style.css" rel="stylesheet" />

<script>

function displayDate() {
const today = new Date();
document.getElementById("date").textContent = today.toDateString();
}

/* Slider */
function updateSlider(val){
document.getElementById("sliderValue").innerText = val;
}

/* Password Validation */
function checkPassword(){

let p1 = document.getElementById("password").value;
let p2 = document.getElementById("password2").value;

if(p1.length < 8){
document.getElementById("passwordError").innerText = "Password must be 8 characters";
}else{
document.getElementById("passwordError").innerText = "";
}

if(p1 !== p2){
document.getElementById("password2Error").innerText = "Passwords do not match";
}else{
document.getElementById("password2Error").innerText = "";
}

}

/* Review Form */

function reviewForm(){

let fname = document.getElementById("fname").value;
let lname = document.getElementById("lname").value;
let email = document.getElementById("email").value;

document.getElementById("reviewSection").innerHTML =
"<h3>Review Information</h3>" +
"<p>Name: " + fname + " " + lname + "</p>" +
"<p>Email: " + email + "</p>";

}

/* Date Validation */

function validateForm(){

let dob = document.getElementById("dob").value;
let today = new Date();
let inputDate = new Date(dob);

if(inputDate > today){
document.getElementById("dobError").innerText="Future date not allowed";
return false;
}

return true;

}

</script>

</head>
